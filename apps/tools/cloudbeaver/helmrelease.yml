apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cloudbeaver
  namespace: tools
spec:
  interval: 1h
  chart:
    spec:
      chart: app-template
      version: "3.x"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      cloudbeaver:
        containers:
          app:
            image:
              repository: dbeaver/cloudbeaver
              tag: "latest"
            env:
              CB_ADMIN_NAME:
                valueFrom:
                  secretKeyRef:
                    name: cloudbeaver-secrets
                    key: CB_ADMIN_NAME
              CB_ADMIN_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: cloudbeaver-secrets
                    key: CB_ADMIN_PASSWORD
    service:
      app:
        controller: cloudbeaver
        ports:
          http:
            port: 8978
    persistence:
      data:
        accessMode: ReadWriteOnce
        size: 1Gi
        globalMounts:
          - path: /opt/cloudbeaver/workspace
    ingress:
      app:
        className: traefik
        hosts:
          - host: cloudbeaver.conderhome.xyz
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: app
                  port: http
