apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns
  namespace: tools
spec:
  interval: 1h
  chart:
    spec:
      chart: external-dns
      version: "1.x"
      sourceRef:
        kind: HelmRepository
        name: external-dns
        namespace: flux-system
  values:
    provider:
      name: pihole

    extraArgs:
      - --pihole-tls-skip-verify
      - --pihole-api-version=6

    env:
      - name: EXTERNAL_DNS_PIHOLE_SERVER
        valueFrom:
          secretKeyRef:
            name: external-dns-pihole
            key: address
      - name: EXTERNAL_DNS_PIHOLE_PASSWORD
        valueFrom:
          secretKeyRef:
            name: external-dns-pihole
            key: password

    policy: upsert-only
    sources:
      - ingress
    domainFilters:
      - conderhome.xyz
    txtOwnerId: prod
    interval: 5m
    logLevel: info
