apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mysql
  namespace: tools
spec:
  interval: 1h
  chart:
    spec:
      chart: app-template
      version: "3.x"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:   
    controllers:
      mysql:
        containers:
          app:
            image:
              repository: mysql
              tag: "8"
            env:
              MYSQL_DATABASE: my_database
              MYSQL_ROOT_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: mysql-secrets
                    key: MYSQL_ROOT_PASSWORD
              MYSQL_USER:
                valueFrom:
                  secretKeyRef:
                    name: mysql-secrets
                    key: MYSQL_USER
              MYSQL_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: mysql-secrets
                    key: MYSQL_PASSWORD
    service:
      app:
        controller: mysql
        ports:
          http:
            port: 3306
    persistence:
      data:
        accessMode: ReadWriteOnce
        size: 1Gi
        globalMounts:
          - path: /var/lib/mysql

