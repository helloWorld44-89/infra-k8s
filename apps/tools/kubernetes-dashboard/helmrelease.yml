apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kubernetes-dashboard
  namespace: tools
spec:
  interval: 1h
  chart:
    spec:
      chart: kubernetes-dashboard
      version: "7.x"
      sourceRef:
        kind: HelmRepository
        name: kubernetes-dashboard
        namespace: flux-system
  values:
    app:
      ingress:
        enabled: true
        ingressClassName: traefik
        hosts:
          - dashboard.conderhome.xyz
        tls:
          enabled: false
