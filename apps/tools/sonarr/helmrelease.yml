apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sonarr
  namespace: tools
spec:
  interval: 1h
  chart:
    spec:
      chart: app-template
      version: "3.x"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      sonarr:
        containers:
          app:
            image:
              repository: linuxserver/sonarr
              tag: latest
            env:
              TZ: America/Chicago
    service:
      sonarr:
        controller: sonarr
        ports:
          http:
            port: 8989
    ingress:
      sonarr:
        className: traefik
        hosts:
          - host: sonarr.conderhome.xyz
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: sonarr
                  port: http
    persistence:
      config:
        accessMode: ReadWriteOnce
        size: 1Gi
        globalMounts:
          - path: /config
      media:
        existingClaim: downloads-pvc
        globalMounts:
          - path: /downloads
