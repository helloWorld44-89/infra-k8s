apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: plane
  namespace: tools
spec:
  interval: 1h
  chart:
    spec:
      chart: plane-ce
      version: "1.x"
      sourceRef:
        kind: HelmRepository
        name: plane
        namespace: flux-system
  valuesFrom:
    - kind: Secret
      name: plane-secrets
      valuesKey: SECRET_KEY
      targetPath: env.secret_key
    - kind: Secret
      name: plane-secrets
      valuesKey: POSTGRES_PASSWORD
      targetPath: env.pgdb_password
  values:
    env:
      NEXT_PUBLIC_DEPLOY_URL: "https://plane.conderhome.xyz"
    ingress:
      enabled: true
      appHost: plane.conderhome.xyz
      ingressClass: traefik
    ssl:
      generateCerts: false
      tls_secret_name: ""

    # Bundled dependencies — swap for external if you already have PostgreSQL/Redis
    postgres:
      local_setup: true
      image: "postgres:15-alpine"

    redis:
      local_setup: true
      image: "redis:7-alpine"

    minio:
      local_setup: true
      # File URLs will be served through the ingress host
      local_domain: plane.conderhome.xyz

    web:
      replicas: 1

    api:
      replicas: 1

    worker:
      replicas: 1

    beatWorker:
      replicas: 1
