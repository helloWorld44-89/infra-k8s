apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: homepage
  namespace: tools
spec:
  interval: 1h
  chart:
    spec:
      chart: app-template
      version: "3.x"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      homepage:
        containers:
          app:
            image:
              repository: ghcr.io/gethomepage/homepage
              tag: latest
            env:
              HOMEPAGE_ALLOWED_HOSTS: homepage.conderhome.xyz
    service:
      app:
        controller: homepage
        ports:
          http:
            port: 3000
    persistence:
      config:
        type: persistentVolumeClaim
        storageClass: "nfs"
        accessMode: ReadWriteOnce
        size: 50Mi
        globalMounts:
          - path: /app/config
      logs:
        type: emptyDir
        globalMounts:
          - path: /app/config/logs
    ingress:
      app:
        className: traefik
        hosts:
          - host: homepage.conderhome.xyz
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: app
                  port: http
