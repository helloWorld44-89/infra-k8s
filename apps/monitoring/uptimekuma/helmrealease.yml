apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: uptimekuma
  namespace: monitoring
spec:
  interval: 1h
  chart:
    spec:
      chart: app-template
      version: "3.x"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:   
    controllers:
      uptimekuma:
        containers:
          app:
            image:
              repository: louislam/uptime-kuma
              tag: "2"
    service:
      app:
        controller: uptimekuma
        ports:
          http:
            port: 3001
    persistence:
      data:
        accessMode: ReadWriteOnce
        size: 1Gi
        globalMounts:
          - path: /app/data

