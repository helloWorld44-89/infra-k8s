apiVersion: v1
kind: ConfigMap
metadata:
  name: homelab-overview-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"   # this label tells Grafana's sidecar to pick it up
data:
  homelab-overview.json: |
    {
      "title": "Homelab Infrastructure Overview",
      "uid": "homelab-overview",
      "tags": ["homelab", "infrastructure", "overview"],
      "timezone": "browser",
      "schemaVersion": 16,
      "version": 1,
      "panels": [
        {
          "id": 1,
          "title": "Node Health Overview",
          "type": "row",
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 0}
        },
        {
          "id": 2,
          "title": "CPU Usage per Node",
          "type": "timeseries",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 7, "w": 12, "x": 0, "y": 1},
          "targets": [
            {
              "expr": "100 - (avg by (instance) (rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100)",
              "legendFormat": "{{instance}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "color": {"mode": "thresholds"},
              "thresholds": {
                "steps": [
                  {"color": "green", "value": 0},
                  {"color": "yellow", "value": 70},
                  {"color": "red", "value": 90}
                ]
              }
            }
          }
        },
        {
          "id": 3,
          "title": "Memory Usage per Node",
          "type": "timeseries",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 7, "w": 12, "x": 12, "y": 1},
          "targets": [
            {
              "expr": "(node_memory_MemTotal_bytes{job=\"node-exporter\"} - node_memory_MemAvailable_bytes{job=\"node-exporter\"}) / node_memory_MemTotal_bytes{job=\"node-exporter\"} * 100",
              "legendFormat": "{{instance}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "color": {"mode": "thresholds"},
              "thresholds": {
                "steps": [
                  {"color": "green", "value": 0},
                  {"color": "yellow", "value": 70},
                  {"color": "red", "value": 90}
                ]
              }
            }
          }
        },
        {
          "id": 4,
          "title": "Disk Usage per Node",
          "type": "timeseries",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 7, "w": 24, "x": 0, "y": 8},
          "targets": [
            {
              "expr": "(node_filesystem_size_bytes{job=\"node-exporter\", fstype!~\"tmpfs|overlay\"} - node_filesystem_avail_bytes{job=\"node-exporter\", fstype!~\"tmpfs|overlay\"}) / node_filesystem_size_bytes{job=\"node-exporter\", fstype!~\"tmpfs|overlay\"} * 100",
              "legendFormat": "{{instance}} {{mountpoint}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "color": {"mode": "thresholds"},
              "thresholds": {
                "steps": [
                  {"color": "green", "value": 0},
                  {"color": "yellow", "value": 70},
                  {"color": "red", "value": 90}
                ]
              }
            }
          }
        },
        {
          "id": 5,
          "title": "Pod Health",
          "type": "row",
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 15}
        },
        {
          "id": 6,
          "title": "Running Pods",
          "type": "stat",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 4, "w": 8, "x": 0, "y": 16},
          "targets": [
            {
              "expr": "count(kube_pod_status_phase{job=\"kube-state-metrics\", phase=\"Running\"})",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0
            }
          }
        },
        {
          "id": 7,
          "title": "Pending Pods",
          "type": "stat",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 4, "w": 8, "x": 8, "y": 16},
          "targets": [
            {
              "expr": "sum(kube_pod_status_phase{job=\"kube-state-metrics\", phase=\"Pending\"})",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0,
              "color": {"mode": "thresholds"},
              "thresholds": {
                "steps": [
                  {"color": "green", "value": 0},
                  {"color": "red", "value": 1}
                ]
              }
            }
          }
        },
        {
          "id": 8,
          "title": "CrashLooping Pods",
          "type": "stat",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 4, "w": 8, "x": 16, "y": 16},
          "targets": [
            {
              "expr": "sum(kube_pod_container_status_restarts_total{job=\"kube-state-metrics\"}) by (namespace, pod)",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0,
              "color": {"mode": "thresholds"},
              "thresholds": {
                "steps": [
                  {"color": "green", "value": 0},
                  {"color": "red", "value": 1}
                ]
              }
            }
          }
        },
        {
          "id": 9,
          "title": "Cluster Resource Utilization",
          "type": "row",
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 20}
        },
        {
          "id": 10,
          "title": "CPU Allocated vs Total",
          "type": "barchart",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 7, "w": 12, "x": 0, "y": 21},
          "targets": [
            {
              "expr": "sum(kube_node_status_capacity{job=\"kube-state-metrics\", resource=\"cpu\"})",
              "legendFormat": "Total CPU",
              "refId": "A"
            },
            {
              "expr": "sum(kube_node_status_allocatable{job=\"kube-state-metrics\", resource=\"cpu\"})",
              "legendFormat": "Allocatable CPU",
              "refId": "B"
            }
          ]
        },
        {
          "id": 11,
          "title": "Memory Allocated vs Total",
          "type": "barchart",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 7, "w": 12, "x": 12, "y": 21},
          "targets": [
            {
              "expr": "sum(kube_node_status_capacity{job=\"kube-state-metrics\", resource=\"memory\"})",
              "legendFormat": "Total Memory",
              "refId": "A"
            },
            {
              "expr": "sum(kube_node_status_allocatable{job=\"kube-state-metrics\", resource=\"memory\"})",
              "legendFormat": "Allocatable Memory",
              "refId": "B"
            }
          ]
        },
        {
          "id": 12,
          "title": "Kubernetes Control Plane",
          "type": "row",
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 28}
        },
        {
          "id": 13,
          "title": "API Server Status",
          "type": "stat",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 4, "w": 8, "x": 0, "y": 29},
          "targets": [
            {
              "expr": "up{job=\"apiserver\"}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {"mode": "thresholds"},
              "thresholds": {
                "steps": [
                  {"color": "red", "value": 0},
                  {"color": "green", "value": 1}
                ]
              }
            }
          }
        },
        {
          "id": 14,
          "title": "CoreDNS Status",
          "type": "stat",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 4, "w": 8, "x": 8, "y": 29},
          "targets": [
            {
              "expr": "up{job=\"coredns\"}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {"mode": "thresholds"},
              "thresholds": {
                "steps": [
                  {"color": "red", "value": 0},
                  {"color": "green", "value": 1}
                ]
              }
            }
          }
        },
        {
          "id": 15,
          "title": "Scheduler Status",
          "type": "stat",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 4, "w": 8, "x": 16, "y": 29},
          "targets": [
            {
              "expr": "up{job=\"kube-scheduler\"}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {"mode": "thresholds"},
              "thresholds": {
                "steps": [
                  {"color": "red", "value": 0},
                  {"color": "green", "value": 1}
                ]
              }
            }
          }
        },
        {
          "id": 16,
          "title": "Flux CD Pipeline",
          "type": "row",
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 33}
        },
        {
          "id": 17,
          "title": "Flux Source Status",
          "type": "table",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 7, "w": 12, "x": 0, "y": 34},
          "targets": [
            {
              "expr": "flux_source_status_ready",
              "refId": "A"
            }
          ]
        },
        {
          "id": 18,
          "title": "Flux Sync Status",
          "type": "table",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 7, "w": 12, "x": 12, "y": 34},
          "targets": [
            {
              "expr": "flux_controller_sync_total",
              "refId": "A"
            }
          ]
        },
        {
          "id": 19,
          "title": "Network Throughput",
          "type": "row",
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 41}
        },
        {
          "id": 20,
          "title": "Network I/O per Node",
          "type": "timeseries",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 7, "w": 24, "x": 0, "y": 42},
          "targets": [
            {
              "expr": "rate(node_network_transmit_bytes_total{job=\"node-exporter\"}[5m])",
              "legendFormat": "{{instance}} TX",
              "refId": "A"
            },
            {
              "expr": "rate(node_network_receive_bytes_total{job=\"node-exporter\"}[5m])",
              "legendFormat": "{{instance}} RX",
              "refId": "B"
            }
          ]
        },
        {
          "id": 21,
          "title": "Top Resource Consumers",
          "type": "row",
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 49}
        },
        {
          "id": 22,
          "title": "Top 5 CPU Consuming Pods",
          "type": "table",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 50},
          "targets": [
            {
              "expr": "topk(5, sum(rate(container_cpu_usage_seconds_total{container!~\"POD|pause.*\"}[5m])) by (pod, namespace))",
              "refId": "A"
            }
          ]
        },
        {
          "id": 23,
          "title": "Top 5 Memory Consuming Pods",
          "type": "table",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 50},
          "targets": [
            {
              "expr": "topk(5, sum(container_memory_working_set_bytes{container!~\"POD|pause.*\"}) by (pod, namespace))",
              "refId": "A"
            }
          ]
        }
      ],
      "refresh": "30s",
      "time": {
        "from": "now-1h",
        "to": "now"
      }
    }
