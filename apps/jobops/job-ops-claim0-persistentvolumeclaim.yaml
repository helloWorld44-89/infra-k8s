apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  labels:
    io.kompose.service: job-ops-claim0
  name: job-ops-claim0
  namespace: apps
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  labels:
    io.kompose.service: codex-home
  name: codex-home
  namespace: apps
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs
  resources:
    requests:
      storage: 1Gi